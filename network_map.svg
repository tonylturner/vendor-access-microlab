<!-- ===== Flow lines (simplified: only vendor-reach paths) ===== -->

<!-- 1. OEM cloud support portal → SRA broker (persistent, vendor-originated) -->
<path d="M 125 143 L 295 131" stroke="#1A1A1A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<!-- 1b. SRA broker → Jump host (persistent, internal) -->
<path d="M 347 152 L 347 170" stroke="#1A1A1A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<!-- 1c. Jump host → HMI (persistent, this is THE main vendor path into OT) -->
<path d="M 400 191 L 430 191" stroke="#1A1A1A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

<!-- 2. Vendor patch infrastructure → Patch relay (vendor outbound) -->
<path d="M 125 223 L 295 250" stroke="#1A1A1A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<!-- 2b. Patch relay → SCADA historian (persistent into OT) -->
<path d="M 400 251 L 430 251" stroke="#1A1A1A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

<!-- 3. OEM federated identity → Active Directory (INHERITED trust, dotted) -->
<path d="M 125 303 Q 145 220 160 131" stroke="#5F5E5A" stroke-width="1.8" stroke-dasharray="1 4" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>

<!-- 4. OEM analytics → Historian replica → SCADA historian -->
<path d="M 125 383 L 295 311" stroke="#5F5E5A" stroke-width="1.8" stroke-dasharray="1 4" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
<path d="M 400 311 Q 415 280 430 251" stroke="#5F5E5A" stroke-width="1.8" stroke-dasharray="1 4" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>

<!-- 5. THE BYPASS — OEM cloud arcs under everything to LTE modem (single clean arc) -->
<path d="M 75 165 Q 75 445 612 445 L 612 242" stroke="#A32D2D" stroke-width="3" stroke-dasharray="9 5" fill="none" marker-end="url(#arrow)"/>
<!-- LTE modem → PLC subnet (the modem's terminal hop) -->
<path d="M 612 242 L 612 340" stroke="#A32D2D" stroke-width="3" stroke-dasharray="9 5" fill="none" marker-end="url(#arrow)"/>

